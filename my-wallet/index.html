<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI ACCOUNT| Cüzdanım</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.3rem;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .wallet-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            margin: 20px;
        }

        .wallet-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 64px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .wallet-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .wallet-icon i {
            font-size: 42px;
            color: white;
        }

        .balance-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            color: #888;
            margin-bottom: 15px;
        }

        .balance-amount {
            font-size: 4rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .balance-currency {
            font-size: 1.8rem;
            font-weight: 600;
            color: #888;
        }

        .load-money-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            margin: 20px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .load-money-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 3000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 550px) {
            .wallet-card {
                padding: 35px 25px;
                border-radius: 48px;
            }
            .balance-amount {
                font-size: 3rem;
            }
            .balance-currency {
                font-size: 1.3rem;
            }
            .back-button {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </div>

    <div class="wallet-container" id="walletContainer">
        <div class="wallet-card" id="walletCard">
            <div id="contentArea">
                <div style="text-align: center; padding: 30px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 15px; color: #888;">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8",
            authDomain: "bliesports.firebaseapp.com",
            projectId: "bliesports",
            storageBucket: "bliesports.firebasestorage.app",
            appId: "1:880767104142:web:5edbe111f42f16ab1545df"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if(toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function goBack() {
            window.location.href = '/index.html';
        }

        async function getBalance() {
            if(!currentUser) return 0;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if(doc.exists) {
                    return doc.data().balance || 0;
                } else {
                    await db.collection('users').doc(currentUser.uid).set({
                        name: currentUser.displayName || "Kullanıcı",
                        email: currentUser.email,
                        balance: 0,
                        createdAt: new Date()
                    });
                    return 0;
                }
            } catch(e) {
                console.error("Bakiye hatası:", e);
                return 0;
            }
        }

        async function renderWallet() {
            const contentArea = document.getElementById('contentArea');
            
            if(!currentUser) {
                contentArea.innerHTML = `
                    <div class="wallet-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <h2 style="margin-bottom: 15px;">Giriş Yapmalısınız</h2>
                    <p style="color: #888; margin-bottom: 25px;">Cüzdanını görmek için giriş yap</p>
                    <button class="load-money-btn" onclick="window.location.href='/index.html'">
                        <i class="fas fa-sign-in-alt"></i> Giriş Yap
                    </button>
                `;
                return;
            }

            const balance = await getBalance();
            
            contentArea.innerHTML = `
                <div class="wallet-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="balance-label">GÜNCEL BAKİYEN</div>
                <div class="balance-amount">${balance.toFixed(2)}<span class="balance-currency">₺</span></div>
                <button class="load-money-btn" onclick="loadMoney()">
                    <i class="fas fa-plus-circle"></i> Bakiye Yükle
                </button>
            `;
        }

        function loadMoney() {
            window.location.href = '/my-wallet/load-money/index.html';
        }

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            await renderWallet();
        });

        window.goBack = goBack;
        window.loadMoney = loadMoney;
    </script>
</body>
</html>
