<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI | Bakiye Yükle</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ChatGPT Image 4 May 2026 17_50_07.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* Geri Butonu */
        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 1.3rem;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* Ana Kart */
        .load-container {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
        }

        .load-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 56px;
            padding: 45px 35px;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        /* Başlık İkon */
        .title-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.3);
        }

        .title-icon i {
            font-size: 36px;
            color: white;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 35px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        /* Tutar Seçenekleri */
        .amount-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            display: block;
            font-size: 0.9rem;
        }

        .amount-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .amount-option {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 14px 0;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .amount-option:hover {
            border-color: #f59e0b;
            background: #fffbeb;
            transform: translateY(-2px);
        }

        .amount-option.active {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
        }

        /* Özel Tutar Input */
        .custom-amount {
            margin-bottom: 35px;
        }

        .custom-amount label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9rem;
        }

        .amount-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 5px 20px;
            transition: all 0.3s ease;
        }

        .amount-input-wrapper:focus-within {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        .currency-symbol {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-right: 12px;
        }

        .amount-input {
            flex: 1;
            border: none;
            padding: 16px 0;
            font-size: 1.2rem;
            font-weight: 600;
            outline: none;
            background: transparent;
            color: #1e293b;
        }

        .amount-input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        /* Ödeme Butonu */
        .payment-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            border: none;
            padding: 18px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.35);
        }

        .payment-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.45);
        }

        .payment-btn:active {
            transform: translateY(0);
        }

        /* Güvenlik ve Ödeme Metotları */
        .security-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .security-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .security-item i {
            font-size: 0.9rem;
            color: #22c55e;
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 18px;
            font-size: 1.8rem;
            color: #cbd5e1;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 3000;
            animation: slideUp 0.3s ease;
            font-size: 0.85rem;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 4000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .loading-spinner {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .load-card {
                padding: 35px 22px;
                border-radius: 44px;
            }
            
            .amount-options {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .amount-option {
                padding: 12px 0;
                font-size: 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .back-button {
                top: 20px;
                left: 20px;
                width: 42px;
                height: 42px;
            }
            
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </div>

    <div class="load-container">
        <div class="load-card">
            <div class="title-icon">
                <i class="fas fa-coins"></i>
            </div>
            
            <h1>Bakiye Yükle</h1>
            <p class="subtitle">Hesabınıza anında bakiye ekleyin</p>
            
            <div class="amount-label">
                <i class="fas fa-bolt" style="color: #f59e0b; margin-right: 6px;"></i> Hızlı Seçenekler
            </div>
            
            <div class="amount-options" id="amountOptions">
                <div class="amount-option" data-amount="10">10 ₺</div>
                <div class="amount-option" data-amount="50">50 ₺</div>
                <div class="amount-option" data-amount="100">100 ₺</div>
                <div class="amount-option" data-amount="200">200 ₺</div>
                <div class="amount-option" data-amount="500">500 ₺</div>
                <div class="amount-option" data-amount="1000">1000 ₺</div>
            </div>
            
            <div class="custom-amount">
                <label><i class="fas fa-pen" style="color: #f59e0b; margin-right: 6px;"></i> Özel Tutar</label>
                <div class="amount-input-wrapper">
                    <span class="currency-symbol">₺</span>
                    <input type="number" id="customAmount" class="amount-input" placeholder="0,00" step="any" min="1">
                </div>
            </div>
            
            <button class="payment-btn" onclick="startPayment()">
                <i class="fas fa-credit-card"></i>
                Ödemeye Devam Et
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <div class="security-info">
                <div class="security-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>256 Bit SSL Güvenli</span>
                </div>
                <div class="security-item">
                    <i class="fas fa-clock"></i>
                    <span>Anında Yansıma</span>
                </div>
                <div class="security-item">
                    <i class="fas fa-gem"></i>
                    <span>Komisyon Yok</span>
                </div>
            </div>
            
            <div class="payment-icons">
                <i class="fab fa-cc-visa"></i>
                <i class="fab fa-cc-mastercard"></i>
                <i class="fab fa-cc-amex"></i>
                <i class="fab fa-cc-paypal"></i>
                <i class="fab fa-apple-pay"></i>
                <i class="fab fa-google-pay"></i>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8",
            authDomain: "bliesports.firebaseapp.com",
            projectId: "bliesports",
            storageBucket: "bliesports.firebasestorage.app",
            appId: "1:880767104142:web:5edbe111f42f16ab1545df"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let selectedAmount = null;

        // Toast
        function showToast(msg, isError = false) {
            const existingToast = document.querySelector('.toast');
            if(existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            if(isError) toast.style.background = '#dc2626';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Geri Git
        function goBack() {
            window.location.href = '/my-wallet/index.html';
        }

        // Tutar Seçimi
        function initAmountOptions() {
            const options = document.querySelectorAll('.amount-option');
            const customInput = document.getElementById('customAmount');
            
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    options.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    selectedAmount = parseInt(opt.getAttribute('data-amount'));
                    customInput.value = selectedAmount;
                });
            });
            
            customInput.addEventListener('input', () => {
                options.forEach(o => o.classList.remove('active'));
                const val = parseFloat(customInput.value);
                if(!isNaN(val) && val > 0) {
                    selectedAmount = val;
                } else {
                    selectedAmount = null;
                }
            });
        }

        // Ödeme Başlat
        async function startPayment() {
            if(!currentUser) {
                showToast('Lütfen önce giriş yapın!', true);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1500);
                return;
            }
            
            let amount = selectedAmount;
            
            const customVal = parseFloat(document.getElementById('customAmount').value);
            if(!isNaN(customVal) && customVal > 0) {
                amount = customVal;
            }
            
            if(!amount || amount < 1) {
                showToast('Lütfen geçerli bir tutar girin (minimum 1 TL)', true);
                return;
            }
            
            // Tutarı localStorage'a kaydet, payment sayfası kullansın
            localStorage.setItem('paymentAmount', amount);
            localStorage.setItem('paymentUserId', currentUser.uid);
            
            // Loading göster
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('active');
            
            // Yönlendir
            setTimeout(() => {
                window.location.href = '/my-wallet/load-money/payment/index.html';
            }, 500);
        }

        // Auth kontrol
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if(!user) {
                showToast('Giriş yapmanız gerekiyor', true);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1500);
            }
        });

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            initAmountOptions();
        });

        // Global fonksiyonlar
        window.goBack = goBack;
        window.startPayment = startPayment;
    </script>
</body>
</html>
